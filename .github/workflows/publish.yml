name: Build plugin

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install
      - run: npm run build

      - name: Package plugin
        run: |
          mkdir dist-zip
          cp index.html package.json README.md LICENSE logo.svg dist-zip/
          cp -r build dist-zip/
          cd dist-zip && zip -r ../package.zip .

      - uses: softprops/action-gh-release@v2
        with:
          files: package.zip
